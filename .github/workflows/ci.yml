name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check internal Markdown links
        run: python3 scripts/check_internal_links.py

      - name: Check MkDocs navigation coverage
        run: python3 scripts/check_nav_coverage.py

      - name: Build site
        run: mkdocs build --strict --clean

      - name: Check rendered shortcode output
        run: python3 scripts/check_rendered_shortcodes.py
