site_name: I ❤️ PETs
site_description: A practical field guide to Privacy-Enhancing Technologies.
site_url: https://ilovepets.github.io/
repo_url: https://github.com/ilovepets/ilovepets.github.io
repo_name: ilovepets/ilovepets.github.io

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Start Here:
      - Overview: start-here/index.md
      - What Are PETs?: start-here/what-are-pets.md
      - PET Taxonomy: start-here/pet-taxonomy.md
      - Glossary: start-here/glossary.md
