site_name: I ❤️ PETs
site_description: A practical field guide to Privacy-Enhancing Technologies.
site_url: https://ilovepets.github.io/
repo_url: https://github.com/ilovepets/ilovepets.github.io
repo_name: ilovepets/ilovepets.github.io

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Start Here:
      - Overview: start-here/index.md
      - What Are PETs?: start-here/what-are-pets.md
      - PET Taxonomy: start-here/pet-taxonomy.md
      - Glossary: start-here/glossary.md
  - PET Compass:
      - Overview: pet-compass/index.md
      - Choose a PET: pet-compass/choose-a-pet.md
      - By Data Movement: pet-compass/by-data-movement.md
      - By Threat Model: pet-compass/by-threat-model.md
      - By ML Task: pet-compass/by-ml-task.md
      - Decision Tree: pet-compass/decision-tree.md
  - PET Patterns:
      - Overview: pet-patterns/index.md
      - Federated Analytics: pet-patterns/federated-analytics.md
      - Cross-Silo Federated Learning: pet-patterns/cross-silo-federated-learning.md
      - DP Synthetic Data Release: pet-patterns/dp-synthetic-data-release.md
      - Private Set Intersection: pet-patterns/private-set-intersection.md
      - Private Inference: pet-patterns/private-inference.md
      - Confidential Inference: pet-patterns/confidential-inference.md
      - Federated RAG: pet-patterns/federated-rag.md
      - Private LLM Fine-Tuning: pet-patterns/private-llm-finetuning.md
  - Use Cases:
      - Overview: use-cases/index.md
      - Healthcare: use-cases/healthcare.md
      - Finance: use-cases/finance.md
      - Advertising: use-cases/advertising.md
      - Public Sector: use-cases/public-sector.md
      - AI: use-cases/ai.md
  - PET Architectures:
      - Overview: pet-architectures/index.md
      - FL + Secure Aggregation: pet-architectures/fl-secure-aggregation.md
      - FL + Differential Privacy: pet-architectures/fl-differential-privacy.md
      - MPC Analytics Pipeline: pet-architectures/mpc-analytics-pipeline.md
      - HE Private Inference API: pet-architectures/he-private-inference-api.md
      - Confidential RAG: pet-architectures/confidential-rag.md
      - Synthetic Data Release Pipeline: pet-architectures/synthetic-data-release-pipeline.md
